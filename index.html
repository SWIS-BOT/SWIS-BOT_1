<body>

<h2>🤖 St. Willibrord AGENT</h2>

<div id="chatbox"></div><br>

<input type="text" id="userInput" placeholder="Try: 5+7, square 4, sqrt 16">
<button onclick="sendMessage()">Send</button>

<script>
function sendMessage() {
    let input = document.getElementById("userInput");
    let message = input.value.trim();

    if (message === "") return;

    let chatbox = document.getElementById("chatbox");

    // Show user message
    chatbox.innerHTML += "<p class='user'><b>You:</b> " + message + "</p>";

    // Typing effect
    chatbox.innerHTML += "<p class='bot' id='typing'><b>Bot:</b> Calculating...</p>";

    input.value = "";

    setTimeout(() => {
        document.getElementById("typing").remove();

        let reply = "";

        try {
            let msg = message.toLowerCase();

            // Square
            if (msg.startsWith("square")) {
                let num = parseFloat(msg.split(" ")[1]);
                reply = "Answer: " + (num * num);
            }

            // Cube
            else if (msg.startsWith("cube")) {
                let num = parseFloat(msg.split(" ")[1]);
                reply = "Answer: " + (num * num * num);
            }

            // Square root
            else if (msg.startsWith("sqrt")) {
                let num = parseFloat(msg.split(" ")[1]);
                reply = "Answer: " + Math.sqrt(num);
            }

            // Percentage
            else if (msg.includes("% of")) {
                let parts = msg.split("% of");
                let percent = parseFloat(parts[0]);
                let total = parseFloat(parts[1]);
                reply = "Answer: " + (percent / 100 * total);
            }

            // Arithmetic
            else if (/^[0-9+\-*/(). ]+$/.test(msg)) {
                reply = "Answer: " + eval(msg);
            }

            // Invalid input
            else {
                reply = "Please enter valid math (e.g., 5+7, square 4, sqrt 16)";
            }

        } catch {
            reply = "Error! Try a valid math problem.";
        }

        chatbox.innerHTML += "<p class='bot'><b>Bot:</b> " + reply + "</p>";

        // ✅ AUTO SCROLL
        chatbox.scrollTop = chatbox.scrollHeight;

    }, 700);
}
</script>
